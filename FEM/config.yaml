units: "SI"   # meters, Pascals

geometry:
  W: 0.200          # plate width in x (m)
  H: 0.300          # plate height in y (m)  (set to whatever you want)
  R: 0.015          # hole radius (m) (Ø30 mm)
  a: 0.012          # crack extension from hole edge (m)
  crack_opening: 0.05   # small gap to form two crack faces (m) ~0.2 mm
  tip_refine_radius: 0.004  # refine around crack tip (m)

mesh:
  lc_global: 0.006        # global target element size (m)
  lc_tip: 0.0012          # near-tip target element size (m)
  order: 1                # element order (1 = linear triangles)

material:
  E: 7.31e10     # Pa
  nu: 0.33
  plane_stress: true
  thickness: 0.002  # m (2 mm)

loading:
  type: "traction"    # "traction" recommended
  traction_right: 2.5e7  # Pa (25 MPa)
  fix_left: true
  fix_left_y: true       # constrain vertical rigid body mode

post:
  export_dir: "../Data"
  export_prefix: "pyFEM"
  crack_line_y: 0.0
  crack_band: 1.0e-3     # select nodes within +/- band of crack line (m)
  x_tip: null            # if null, computed as x_tip = (W/2 - R) + a for centered hole